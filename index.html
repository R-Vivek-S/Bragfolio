  <body>
    <div id="root"></div>

  <!-- ═══════════════════════════════════════════════════════════
       GOLDEN GLITTER v3  —  Localized cursor-radius scatter
  ═══════════════════════════════════════════════════════════ -->

  <div id="_rv_cur"></div>
  <div id="_rv_ring"></div>
  <!-- Scroll overlay: dims hero particles on other sections -->
  <div id="_rv_overlay"></div>

  <style>
    *{cursor:none!important}
    #_rv_cur{
      position:fixed;width:12px;height:12px;
      background:radial-gradient(circle at 38% 32%,#fffde8 0%,#f5e642 40%,#c9a96e 80%);
      border-radius:50%;transform:translate(-50%,-50%);
      pointer-events:none;z-index:999999;
      box-shadow:0 0 6px 2px #e8c54788,0 0 18px 5px #c9a96e44;
      transition:transform 0.08s ease,background 0.25s;
    }
    #_rv_ring{
      position:fixed;width:34px;height:34px;
      border:1.5px solid #c9a96e77;border-radius:50%;
      transform:translate(-50%,-50%);pointer-events:none;z-index:999998;
      transition:border-color 0.3s,
                 width 0.35s cubic-bezier(.34,1.56,.64,1),
                 height 0.35s cubic-bezier(.34,1.56,.64,1);
    }
    #_rv_ring::before{
      content:'';position:absolute;inset:5px;
      border-radius:50%;border:0.5px solid #c9a96e33;
    }
    .snap-section h2{transition:filter 0.35s ease;}
    .snap-section h2:hover{
      filter:drop-shadow(0 0 10px rgba(232,197,71,.80))
             drop-shadow(0 0 30px rgba(201,169,110,.45))
             drop-shadow(0 0 60px rgba(201,169,110,.20));
    }

    /* ── SCROLL OVERLAY ───────────────────────────────────────────
       Sits ABOVE the Three.js canvas (z:999) so it naturally
       dims the hero-name particles when the user is on any
       section below the hero. pointer-events:none keeps it inert. */
    #_rv_overlay{
      position:fixed;
      inset:0;
      background:#0a0908;          /* matches page bg exactly       */
      opacity:0;                   /* transparent on hero section   */
      pointer-events:none;
      z-index:1000;                /* above Three.js canvas (999)   */
      transition:opacity 0.55s cubic-bezier(0.4,0,0.2,1);
      will-change:opacity;
    }


    /* ── CANVAS STACKING ─────────────────────────────────────────
       Canvas is z-index:-1 (behind everything).
       To make it visible we need the stacking chain to be transparent:
         html (bg: #0a0908) → body (transparent) → #root (transparent)
         → .snap-container (transparent) → #prologue (transparent)
       All other sections have solid bg-dark / bg-dark-alt which cover it.
    */
    body            { background: transparent !important; }
    #root           { background: transparent !important; }
    .snap-container { background: transparent !important; }
    #prologue       { background: transparent !important; }

    #_rv_hero_zone{
      position:fixed;pointer-events:auto;z-index:1000;cursor:none!important;
    }

    @media (max-width: 768px) {
      #_rv_cur, #_rv_ring {
        display: none !important;
      }
      * {
        cursor: auto !important;
      }
    }
  </style>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

        y: -(cy - window.innerHeight * 0.5)

    }

      ctx.fillRect(0, 0, 64, 64);
      ctx.save(); ctx.translate(32, 32);
      ctx.fillStyle = 'rgba(255,252,220,0.95)';
      for(var r = 0; r < 4; r++){
        ctx.save(); ctx.rotate(r * Math.PI * 0.5);
        ctx.beginPath(); ctx.moveTo(0,0);
        ctx.lineTo(1.8,-3.5); ctx.lineTo(0,-28); ctx.lineTo(-1.8,-3.5);
        ctx.closePath(); ctx.fill(); ctx.restore();
      }
      ctx.fillStyle = 'rgba(255,252,220,0.52)';
      for(var r = 0; r < 4; r++){
        ctx.save(); ctx.rotate(r * Math.PI * 0.5 + Math.PI * 0.25);
        ctx.beginPath(); ctx.moveTo(0,0);
        ctx.lineTo(1.2,-2); ctx.lineTo(0,-18); ctx.lineTo(-1.2,-2);
        ctx.closePath(); ctx.fill(); ctx.restore();
      }
      ctx.restore();
      spriteTex = new THREE.CanvasTexture(c);
      return spriteTex;
    }

    // ── CURSOR ───────────────────────────────────────────────────
    function setupCursor(){
      var cur  = document.getElementById('_rv_cur');
      var ring = document.getElementById('_rv_ring');
      var mx = window.innerWidth * 0.5;
      var my = window.innerHeight * 0.5;
      var rx = mx, ry = my;

      window.addEventListener('mousemove', function(e){
        mx = e.clientX; my = e.clientY;
        cur.style.left = mx + 'px';
        cur.style.top  = my + 'px';
      });
      window.addEventListener('mousedown', function(){
        cur.style.transform = 'translate(-50%,-50%) scale(0.65)';
      });
      window.addEventListener('mouseup', function(){
        cur.style.transform = 'translate(-50%,-50%) scale(1)';
      });
      document.addEventListener('mouseover', function(e){
        var hot = e.target.closest(
          'a,button,.nav-dot,h2,.project-card,.wax-seal,.skill-pill,.interest-card,#_rv_hero_zone'
        );
        if(hot){
          cur.style.transform = 'translate(-50%,-50%) scale(2.4)';
          cur.style.background = 'radial-gradient(circle at 38% 32%,#fff 0%,#f5e642 55%,#c9a96e 90%)';
          ring.style.width  = '50px';
          ring.style.height = '50px';
          ring.style.borderColor = '#e8c547bb';
        } else {
          cur.style.transform = 'translate(-50%,-50%) scale(1)';
          cur.style.background = 'radial-gradient(circle at 38% 32%,#fffde8 0%,#f5e642 40%,#c9a96e 80%)';
          ring.style.width  = '34px';
          ring.style.height = '34px';
          ring.style.borderColor = '#c9a96e77';
        }
      });
      (function tickRing(){
        rx += (mx - rx) * 0.11;
        ry += (my - ry) * 0.11;
        ring.style.left = rx + 'px';
        ring.style.top  = ry + 'px';
        requestAnimationFrame(tickRing);
      })();

      // Cursor trail glitter
      var lsx = 0, lsy = 0;
      window.addEventListener('mousemove', function(e){
        var dx = e.clientX - lsx, dy = e.clientY - lsy;
        if(dx*dx + dy*dy > 400){
          lsx = e.clientX; lsy = e.clientY;
          if(glitterSys) spawnGlitter(e.clientX, e.clientY, 2, 0.55);
        }
      });
    }

    // ── THREE SCENE ──────────────────────────────────────────────
    function setupScene(){
      var cvs = document.createElement('canvas');
      cvs.style.cssText = [
        'position:fixed','top:0','left:0',
        'width:100%','height:100%',
        'pointer-events:none','z-index:-1'
      ].join(';');
      threeCanvas = cvs;
      document.body.appendChild(cvs);

      renderer = new THREE.WebGLRenderer({ canvas: cvs, alpha: true, antialias: true });
      renderer.setClearColor(0x000000, 0);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      buildCamera();
      scene = new THREE.Scene();

            document.fonts.ready.then(function(){ setTimeout(buildHero, 600); });

      // Section heading glitter
      document.querySelectorAll('.snap-section h2').forEach(function(h2){
        h2.addEventListener('mouseenter', function(e){
          spawnGlitter(e.clientX, e.clientY, 60, 1.0);
        });
        h2.addEventListener('mousemove', function(e){
          if(Math.random() < 0.3) spawnGlitter(e.clientX, e.clientY, 7, 1.0);
        });
      });

      var clk = new THREE.Clock();
      function tick(){
        requestAnimationFrame(tick);
        var dt = Math.min(clk.getDelta(), 0.05);
        heroAlpha += (heroAlphaT - heroAlpha) * 0.09;
        if(heroSys) heroSys.update(dt);
        updateGlitter(dt);
        renderer.render(scene, camera);
      }
      tick();

      window.addEventListener('resize', function(){
        buildCamera();
        document.fonts.ready.then(function(){ setTimeout(buildHero, 150); });
      });
    }

    function buildCamera(){
      var w = window.innerWidth, h = window.innerHeight;
      renderer.setSize(w, h);
      camera = new THREE.OrthographicCamera(-w/2, w/2, h/2, -h/2, 0.1, 2000);
      camera.position.z = 500;
      camera.updateProjectionMatrix();
    }

    // ── HERO PARTICLE SYSTEM ─────────────────────────────────────
    function buildHero(){
      var el = document.querySelector('.hero-name');
      if(!el) return;
      var rect = el.getBoundingClientRect();
      if(rect.width < 20 || rect.height < 20){ setTimeout(buildHero, 300); return; }

      var fs  = parseFloat(window.getComputedStyle(el).fontSize) || 80;
      var pad = 50;
      var cw  = Math.ceil(rect.width)  + pad * 2;
      var ch  = Math.ceil(rect.height) + pad * 2;

      var oc  = document.createElement('canvas');
      oc.width = cw; oc.height = ch;
      var ctx = oc.getContext('2d');
      ctx.clearRect(0, 0, cw, ch);
      ctx.fillStyle   = 'white';
      ctx.font        = '300 ' + fs + 'px "Cinzel Decorative",serif';
      ctx.textAlign   = 'center';
      ctx.textBaseline= 'middle';

      var lines = ['RAJVIVEK', 'SUNDRIYAL'];
      var lh = fs * 1.15;
      var th = lines.length * lh;
      lines.forEach(function(ln, i){
        ctx.fillText(ln, cw / 2, (ch - th) / 2 + i * lh + lh / 2);
      });

      var imgd = ctx.getImageData(0, 0, cw, ch).data;
      var pData = [];
      var step  = 1;
      for(var y = 0; y < ch; y += step){
        for(var x = 0; x < cw; x += step){
          var idx = (y * cw + x) * 4;
          if(imgd[idx + 3] > 100){
            var w = d2w(rect.left - pad + x, rect.top - pad + y);
            pData.push({
              ox: w.x, oy: w.y,    // original world position
              sx: rect.left - pad + x,  // original screen x
              sy: rect.top  - pad + y,  // original screen y
              x: w.x, y: w.y,
              vx: 0, vy: 0,
              state: 'idle'  // per-particle: 'idle' | 'scatter' | 'reform'
            });
          }
        }
      }
      if(!pData.length){ setTimeout(buildHero, 300); return; }

      var n      = pData.length;
      var posArr = new Float32Array(n * 3);
      var colArr = new Float32Array(n * 3);
      var szArr  = new Float32Array(n);

      pData.forEach(function(p, i){
        posArr[i*3]   = p.x;
        posArr[i*3+1] = p.y;
        posArr[i*3+2] = 0;
        var rnd = Math.random();
        colArr[i*3]   = 0.94 + rnd * 0.06;
        colArr[i*3+1] = 0.72 + rnd * 0.20;
        colArr[i*3+2] = 0.14 + rnd * 0.10;
        szArr[i] = 1.0 + Math.random() * 1.5;
      });

      var geo = new THREE.BufferGeometry();
      geo.setAttribute('position', new THREE.BufferAttribute(posArr, 3));
      geo.setAttribute('color',    new THREE.BufferAttribute(colArr, 3));
      geo.setAttribute('size',     new THREE.BufferAttribute(szArr,  1));

      var mat = new THREE.ShaderMaterial({
        uniforms: { tex: { value: makeSprite() }, uAlpha: { value: 1.0 } },
        vertexShader: [
          'attribute float size;',
          'attribute vec3 color;',
          'varying vec3 vC;',
          'void main(){',
          '  vC = color;',
          '  vec4 mv = modelViewMatrix * vec4(position, 1.0);',
          '  gl_PointSize = size * (580.0 / -mv.z);',
          '  gl_Position  = projectionMatrix * mv;',
          '}'
        ].join('\n'),
        fragmentShader: [
          'uniform sampler2D tex;',
          'uniform float uAlpha;',
          'varying vec3 vC;',
          'void main(){',
          '  vec4 t = texture2D(tex, gl_PointCoord);',
          '  float a = t.a * uAlpha;',
          '  if(a < 0.015) discard;',
          '  gl_FragColor = vec4(vC, a);',
          '}'
        ].join('\n'),
        blending:    THREE.AdditiveBlending,
        depthTest:   false,
        transparent: true,
      });

      var pts = new THREE.Points(geo, mat);
      pts.visible = heroAlphaT > 0.01;

      if(heroSys){
        scene.remove(heroSys.pts);
        heroSys.pts.geometry.dispose();
        heroSys.pts.material.dispose();
      }
      scene.add(pts);

      var posAttr = geo.getAttribute('position');
      var colAttr = geo.getAttribute('color');
      var sysT    = 0;

      // Current cursor screen position (updated by hero zone mousemove)
      var cursorSX = -99999, cursorSY = -99999;
      var isOverZone = false;

      heroSys = {
        pts: pts,

        // Called on mousemove — scatter particles near cursor, reform the rest
        pointerMove: function(screenX, screenY){
          cursorSX = screenX;
          cursorSY = screenY;
          var r2 = SCATTER_RADIUS_PX * SCATTER_RADIUS_PX;
          for(var i = 0; i < n; i++){
            var p   = pData[i];
            var dx  = p.sx - screenX;
            var dy  = p.sy - screenY;
            var d2  = dx * dx + dy * dy;
            if(d2 < r2){
              if(p.state !== 'scatter'){
                p.state = 'scatter';
                // Explode outward from cursor with a bit of upward bias
                var angle = Math.atan2(p.sy - screenY, p.sx - screenX);
                // Add tiny random spread so it looks organic
                angle += (Math.random() - 0.5) * 0.8;
                var spd = 80 + Math.random() * 200;
                p.vx = Math.cos(angle) * spd;
                p.vy = -Math.sin(angle) * spd;  // world Y is flipped
                p.vy += 20 + Math.random() * 60; // slight upward float
              }
            } else {
              if(p.state === 'scatter'){
                p.state = 'reform';
              }
            }
          }
        },

        // Called on mouseleave — reform everything
        pointerLeave: function(){
          isOverZone = false;
          cursorSX = -99999; cursorSY = -99999;
          for(var i = 0; i < n; i++){
            if(pData[i].state === 'scatter') pData[i].state = 'reform';
          }
        },

        pointerEnter: function(){ isOverZone = true; },

        update: function(dt){
          sysT += dt;
          mat.uniforms.uAlpha.value = heroAlpha;
          var pa = posAttr.array, ca = colAttr.array, t = sysT;

          for(var i = 0; i < n; i++){
            var p = pData[i];

            if(p.state === 'scatter'){
              // Physics
              p.vy -= 55 * dt;
              p.vx *= 0.974; p.vy *= 0.974;
              p.x  += p.vx * dt;
              p.y  += p.vy * dt;
              // Bright pulsing gold when scattered
              var pulse = 0.5 + 0.5 * Math.sin(t * 7.5 + i * 0.048);
              ca[i*3]   = 0.90 + 0.10 * pulse;
              ca[i*3+1] = 0.60 + 0.30 * pulse;
              ca[i*3+2] = 0.08 + 0.18 * pulse;

            } else if(p.state === 'reform'){
              var dx   = p.ox - p.x;
              var dy   = p.oy - p.y;
              var dist = Math.sqrt(dx * dx + dy * dy);
              var k    = 16;
              p.vx = p.vx * 0.74 + dx * k * dt;
              p.vy = p.vy * 0.74 + dy * k * dt;
              p.x += p.vx * dt;
              p.y += p.vy * dt;
              var br = 1 - Math.min(dist / 70, 1);
              ca[i*3]   = 0.92 + 0.08 * br;
              ca[i*3+1] = 0.70 + 0.20 * br;
              ca[i*3+2] = 0.14;
              if(dist < 1.2) p.state = 'idle';

            } else {
              // Idle: gentle living shimmer
              var wx = Math.sin(t * 0.72 + i * 0.0083) * 0.60;
              var wy = Math.cos(t * 0.56 + i * 0.0097) * 0.48;
              p.x = p.ox + wx;
              p.y = p.oy + wy;
              var s = 0.5 + 0.5 * Math.sin(t * 2.1 + i * 0.014);
              ca[i*3]   = 0.95 + 0.05 * s;
              ca[i*3+1] = 0.80 + 0.20 * s;
              ca[i*3+2] = 0.30 + 0.10 * s;
            }

            pa[i*3]   = p.x;
            pa[i*3+1] = p.y;
          }
          posAttr.needsUpdate = true;
          colAttr.needsUpdate = true;
        }
      };

      // ── INVISIBLE HOVER ZONE ─────────────────────────────────
      var oldZone = document.getElementById('_rv_hero_zone');
      if(oldZone) oldZone.remove();

      var zone = document.createElement('div');
      zone.id  = '_rv_hero_zone';
      zone.style.left   = rect.left   + 'px';
      zone.style.top    = rect.top    + 'px';
      zone.style.width  = rect.width  + 'px';
      zone.style.height = rect.height + 'px';
      document.body.appendChild(zone);

      zone.addEventListener('mouseenter', function(e){
        if(heroSys) heroSys.pointerEnter();
      });
      zone.addEventListener('mouseleave', function(e){
        if(heroSys) heroSys.pointerLeave();
      });
      zone.addEventListener('mousemove', function(e){
        if(heroSys) heroSys.pointerMove(e.clientX, e.clientY);
        // Light glitter spray under cursor
        if(Math.random() < 0.20) spawnGlitter(e.clientX, e.clientY, 3, 1.0);
      });

      zone.addEventListener('wheel', function(e) {
        var container = document.querySelector('.snap-container');
        if (container) {
          container.scrollTop += e.deltaY;
        }
      }, { passive: true });

      el.style.visibility   = 'hidden';
      el.style.pointerEvents= 'none';
    }

    // ── GLITTER POOL ─────────────────────────────────────────────
    function initGlitter(){
      if(glitterSys) return;
      var posArr = new Float32Array(MAX_G * 3);
      var colArr = new Float32Array(MAX_G * 3);
      var szArr  = new Float32Array(MAX_G);
      var alpArr = new Float32Array(MAX_G);
      for(var i = 0; i < MAX_G; i++){
        posArr[i*3] = posArr[i*3+1] = posArr[i*3+2] = -9999;
        alpArr[i] = 0;
      }
      var geo = new THREE.BufferGeometry();
      geo.setAttribute('position', new THREE.BufferAttribute(posArr, 3));
      geo.setAttribute('color',    new THREE.BufferAttribute(colArr, 3));
      geo.setAttribute('size',     new THREE.BufferAttribute(szArr,  1));
      geo.setAttribute('alpha',    new THREE.BufferAttribute(alpArr, 1));

      var mat = new THREE.ShaderMaterial({
        uniforms: { tex: { value: makeSprite() } },
        vertexShader: [
          'attribute float size; attribute vec3 color; attribute float alpha;',
          'varying vec3 vC; varying float vA;',
          'void main(){',
          '  vC = color; vA = alpha;',
          '  vec4 mv = modelViewMatrix * vec4(position, 1.0);',
          '  gl_PointSize = size * (580.0 / -mv.z);',
          '  gl_Position  = projectionMatrix * mv;',
          '}'
        ].join('\n'),
        fragmentShader: [
          'uniform sampler2D tex; varying vec3 vC; varying float vA;',
          'void main(){',
          '  vec4 t = texture2D(tex, gl_PointCoord);',
          '  gl_FragColor = vec4(vC, t.a * vA);',
          '  if(gl_FragColor.a < 0.01) discard;',
          '}'
        ].join('\n'),
        blending: THREE.AdditiveBlending, depthTest: false, transparent: true,
      });

      var pts = new THREE.Points(geo, mat);
      scene.add(pts);

      glitterSys = {
        pts:    pts, geo: geo,
        posAttr: geo.getAttribute('position'),
        colAttr: geo.getAttribute('color'),
        szAttr:  geo.getAttribute('size'),
        alpAttr: geo.getAttribute('alpha'),
      };
      glitterPool = [];
      for(var j = 0; j < MAX_G; j++)
        glitterPool.push({ i: j, active: false, x:0,y:0,vx:0,vy:0,life:0,maxLife:1,aScale:1 });
    }

    function spawnGlitter(cx, cy, count, aScale){
      if(!glitterSys) initGlitter();
      var w = d2w(cx, cy);
      var spawned = 0;
      for(var i = 0; i < glitterPool.length && spawned < count; i++){
        var p = glitterPool[i];
        if(p.active) continue;
        p.active  = true;
        p.x       = w.x + (Math.random() - 0.5) * 50;
        p.y       = w.y + (Math.random() - 0.5) * 25;
        p.vx      = (Math.random() - 0.5) * 200;
        p.vy      = 35 + Math.random() * 260;
        p.life    = 0;
        p.maxLife = 0.4 + Math.random() * 1.3;
        p.aScale  = aScale || 1;
        var rnd = Math.random(), ii = i * 3;
        glitterSys.colAttr.array[ii]   = 0.90 + rnd * 0.10;
        glitterSys.colAttr.array[ii+1] = 0.70 + rnd * 0.22;
        glitterSys.colAttr.array[ii+2] = 0.10 + rnd * 0.12;
        glitterSys.szAttr.array[i]     = 1.5 + Math.random() * 3.0;
        spawned++;
      }
      glitterSys.colAttr.needsUpdate = true;
      glitterSys.szAttr.needsUpdate  = true;
    }

    function updateGlitter(dt){
      if(!glitterSys) return;
      var pa = glitterSys.posAttr.array;
      var aa = glitterSys.alpAttr.array;
      for(var i = 0; i < glitterPool.length; i++){
        var p = glitterPool[i];
        if(!p.active) continue;
        p.life += dt;
        var t = p.life / p.maxLife;
        if(t >= 1){
          p.active = false;
          pa[i*3] = pa[i*3+1] = pa[i*3+2] = -9999;
          aa[i] = 0;
        } else {
          p.vy -= 28 * dt;
          p.vx *= 0.975; p.vy *= 0.975;
          p.x  += p.vx * dt; p.y += p.vy * dt;
          pa[i*3]   = p.x; pa[i*3+1] = p.y; pa[i*3+2] = 0;
          var a = t < 0.15 ? t / 0.15 : 1 - (t - 0.15) / 0.85;
          aa[i] = Math.max(0, Math.min(1, a)) * (p.aScale || 1);
        }
      }
      glitterSys.posAttr.needsUpdate = true;
      glitterSys.alpAttr.needsUpdate = true;
    }

    // ── BOOT ─────────────────────────────────────────────────────
    function boot(){
      setupCursor();
      waitForThree(setupScene);
    }
    if(document.readyState === 'loading')
      document.addEventListener('DOMContentLoaded', boot);
    else boot();

  })();
  </script>

  <!-- ══════════════════════ RAVEN SECTION VIDEO ══════════════════════
       Drop your .mp4 file next to this HTML and set the src below.
       The video sits behind the section text, loops silently.
  ═════════════════════════════════════════════════════════════════════ -->
  <style>
    #rv-video-wrap {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    /* Text stays above */
    #ravens > div {  z-index: 1; }

    #rv-video {
      width: 100%;
      height: 100%;
      object-fit: cover;       /* fills the section, crops edges */
      opacity: 0.2;
      transition: opacity 2 s ease;
      /* tint it gold to match the page theme */
      filter: sepia(0.45) saturate(1.5) hue-rotate(10deg) brightness(0.55);
    }

    #rv-video.rv-vid-in { opacity: 0.5 }
  </style>

  <script>
  (function(){
    function injectVideo(){
      var section = document.getElementById('ravens');
      if(!section){ setTimeout(injectVideo, 200); return; }

      /* Remove old raven wrap if present */
      var old = document.getElementById('rv-video-wrap') ||
                document.getElementById('rv-bg-wrap');
      if(old) old.remove();

      var wrap = document.createElement('div');
      wrap.id = 'rv-video-wrap';

      var vid = document.createElement('video');
      vid.id       = 'rv-video';
      vid.loop     = true;
      vid.muted    = true;
      vid.autoplay = true;
      vid.playsInline = true;
      /* ↓↓↓  PUT YOUR VIDEO FILENAME HERE  ↓↓↓ */
      vid.src      = 'upscaled-video.webm';
      /* ↑↑↑  e.g. 'raven.mp4' or 'videos/raven.mp4'  ↑↑↑ */

      wrap.appendChild(vid);
      section.insertBefore(wrap, section.firstChild);

      /* Fade in when section scrolls into view */
      var io = new IntersectionObserver(function(entries){
        if(entries[0].isIntersecting){
          vid.classList.add('rv-vid-in');
          vid.play().catch(function(){});   /* safe autoplay attempt */
          io.disconnect();
        }
      }, { threshold: 0.10 });
      io.observe(section);
    }

    if(document.readyState === 'loading')
      document.addEventListener('DOMContentLoaded', function(){ setTimeout(injectVideo, 300); });
    else
      setTimeout(injectVideo, 300);
  })();
  </script>
